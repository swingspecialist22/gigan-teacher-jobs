<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>티커리어 - 기간제교사 채용공고</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --red: #dc2626;
      --red-light: #fef2f2;
      --orange: #ea580c;
      --orange-light: #fff7ed;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
      --header-h: 96px;
      --sidebar-w: 72px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── Header ── */
    header {
      background: #fff;
      color: var(--blue);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      border-bottom: 1px solid #e5e7eb;
    }

    .header-row {
      align-items: center;
      display: flex;
      justify-content: space-between;
      padding-right: 16px;
    }

    .app-name {
      color: rgba(255,255,255,.95);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -.02em;
      white-space: nowrap;
    }

    .tabs { display: flex; gap: 0; }

    .tab {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: rgba(0,0,0,.45);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 14px 14px 11px;
      transition: all .15s;
      white-space: nowrap;
    }

    .tab.active { border-bottom-color: var(--blue); color: var(--blue); }

    /* ── Body layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #fff;
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      width: var(--sidebar-w);
      -webkit-overflow-scrolling: touch;
    }

    .sidebar::-webkit-scrollbar { display: none; }

    .sidebar-section-label {
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      color: var(--gray-400);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      padding: 6px 0 5px;
      text-align: center;
    }

    .sidebar-btn {
      background: none;
      border: none;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-600);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      padding: 14px 4px;
      position: relative;
      text-align: center;
      transition: background .12s, color .12s;
      width: 100%;
      line-height: 1.2;
    }

    .sidebar-btn:active { background: var(--gray-100); }

    .sidebar-btn.on {
      background: var(--blue-light);
      color: var(--blue);
      font-weight: 700;
    }

    .sidebar-btn.on::before {
      background: var(--blue);
      border-radius: 0 3px 3px 0;
      content: '';
      height: 100%;
      left: 0;
      position: absolute;
      top: 0;
      width: 3px;
    }

    /* ── Right panel ── */
    .right-panel {
      display: flex;
      flex: 1;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* Search */
    .search-wrap {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      padding: 10px 12px;
    }

    .search-wrap input {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      font-size: 13px;
      outline: none;
      padding: 8px 14px;
      width: 100%;
    }

    .search-wrap input:focus {
      border-color: var(--blue);
      background: #fff;
    }

    /* Level top bar */
    .level-bar {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      flex-shrink: 0;
      gap: 0;
      overflow-x: auto;
      padding: 0 8px;
      -webkit-overflow-scrolling: touch;
    }

    .level-bar::-webkit-scrollbar { display: none; }

    .level-chip {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--gray-400);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 12px 8px;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }

    .level-chip.on {
      border-bottom-color: var(--blue);
      color: var(--blue);
    }

    /* Status */
    .status-bar {
      align-items: center;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      color: var(--gray-400);
      display: flex;
      flex-shrink: 0;
      font-size: 11px;
      justify-content: space-between;
      padding: 5px 12px;
    }

    /* Job list */
    #job-list {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 10px 20px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Job Card ── */
    .job-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      cursor: pointer;
      padding: 12px;
      transition: box-shadow .15s;
    }

    .job-card:active { background: var(--gray-50); }

    .job-card.urgent { border-left: 4px solid var(--red); }
    .job-card.warning { border-left: 4px solid var(--orange); }

    .card-top {
      align-items: flex-start;
      display: flex;
      gap: 6px;
      margin-bottom: 7px;
    }

    .card-title {
      color: var(--gray-800);
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
    }

    .bookmark-btn {
      background: none;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 17px;
      line-height: 1;
      padding: 0;
    }

    .card-meta {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 7px;
    }

    .badge {
      border-radius: 5px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
    }

    .badge-sido { background: var(--blue-light); color: var(--blue); }
    .badge-level { background: var(--gray-100); color: var(--gray-600); }
    .badge-subject { background: #f0fdf4; color: #16a34a; }

    .dday {
      border-radius: 5px;
      font-size: 10px;
      font-weight: 700;
      margin-left: auto;
      padding: 2px 6px;
    }

    .dday-urgent { background: var(--red-light); color: var(--red); }
    .dday-warning { background: var(--orange-light); color: var(--orange); }
    .dday-normal { background: var(--gray-100); color: var(--gray-600); }

    .card-bottom {
      align-items: center;
      display: flex;
      gap: 6px;
    }

    .card-school {
      color: var(--gray-600);
      flex: 1;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .school-link {
      background: none;
      border: 1px solid var(--gray-200);
      border-radius: 4px;
      color: var(--blue);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 10px;
      padding: 2px 5px;
      white-space: nowrap;
    }

    .card-deadline {
      color: var(--gray-400);
      font-size: 12px;
      margin-top: 5px;
    }

    .card-deadline.urgent { color: var(--red); font-weight: 600; }
    .card-deadline.warning { color: var(--orange); font-weight: 600; }

    /* Empty */
    .empty {
      color: var(--gray-400);
      font-size: 13px;
      padding: 48px 16px;
      text-align: center;
    }

    /* ── Modal ── */
    .modal-overlay {
      align-items: flex-end;
      display: none;
      inset: 0;
      background: rgba(0,0,0,.45);
      justify-content: center;
      position: fixed;
      z-index: 200;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 20px 20px 0 0;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
    }

    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }

    .modal-section { margin-bottom: 18px; }

    .modal-section h3 {
      color: var(--gray-600);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .modal-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .chip {
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      color: var(--gray-600);
      cursor: pointer;
      font-size: 13px;
      padding: 6px 14px;
      transition: all .15s;
    }

    .chip.on { background: var(--blue); border-color: var(--blue); color: #fff; }

    .notif-toggle {
      align-items: center;
      background: var(--blue-light);
      border-radius: 12px;
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      padding: 14px;
    }

    .notif-toggle span { flex: 1; font-size: 13px; }

    .toggle {
      appearance: none;
      background: var(--gray-200);
      border-radius: 12px;
      cursor: pointer;
      flex-shrink: 0;
      height: 24px;
      position: relative;
      transition: background .2s;
      width: 44px;
    }

    .toggle::after {
      background: #fff;
      border-radius: 50%;
      content: '';
      height: 18px;
      left: 3px;
      position: absolute;
      top: 3px;
      transition: left .2s;
      width: 18px;
    }

    .toggle:checked { background: var(--blue); }
    .toggle:checked::after { left: 23px; }

    .modal-actions { display: flex; gap: 8px; margin-top: 24px; }

    .btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 0;
    }

    .btn-primary { background: var(--blue); color: #fff; }
    .btn-secondary { background: var(--gray-100); color: var(--gray-600); }

    .subject-input {
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      font-size: 13px;
      outline: none;
      padding: 10px 14px;
      width: 100%;
    }

    .subject-input:focus { border-color: var(--blue); }

    /* ── Sort ── */
    .sort-select {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      color: var(--gray-600);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 12px;
      outline: none;
      padding: 6px 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="tabs">
      <button class="tab active" data-tab="all">전체</button>
      <button class="tab" data-tab="bookmarks">북마크 ⭐</button>

    <img src="logo/logo2.png" alt="티커리어" style="height:36px;object-fit:contain;">
  </div>
</header>

<div class="layout">

  <!-- ── 사이드바 ── -->
  <nav class="sidebar">
    <button class="sidebar-btn on" data-filter="sido" data-val="">전체</button>
    <button class="sidebar-btn" data-filter="sido" data-val="서울">서울</button>
    <button class="sidebar-btn" data-filter="sido" data-val="경기">경기</button>
    <button class="sidebar-btn" data-filter="sido" data-val="인천">인천</button>
    <button class="sidebar-btn" data-filter="sido" data-val="부산">부산</button>
    <button class="sidebar-btn" data-filter="sido" data-val="광주">광주</button>
    <button class="sidebar-btn" data-filter="sido" data-val="대전">대전</button>
    <button class="sidebar-btn" data-filter="sido" data-val="울산">울산</button>
    <button class="sidebar-btn" data-filter="sido" data-val="강원">강원</button>
    <button class="sidebar-btn" data-filter="sido" data-val="경남">경남</button>
    <button class="sidebar-btn" data-filter="sido" data-val="경북">경북</button>
    <button class="sidebar-btn" data-filter="sido" data-val="충남">충남</button>
    <button class="sidebar-btn" data-filter="sido" data-val="충북">충북</button>
    <button class="sidebar-btn" data-filter="sido" data-val="전남">전남</button>
    <button class="sidebar-btn" data-filter="sido" data-val="전북">전북</button>
    <button class="sidebar-btn" data-filter="sido" data-val="세종">세종</button>
    <button class="sidebar-btn" data-filter="sido" data-val="제주">제주</button>
  </nav>

  <!-- ── 오른쪽 패널 ── -->
  <div class="right-panel">
    <div class="search-wrap" style="display:flex;gap:8px;align-items:center;">
      <input type="search" id="search-input" placeholder="학교명, 과목 검색..." autocomplete="off" style="flex:1;">
      <select id="sort-select" class="sort-select">
        <option value="dday">마감임박순</option>
        <option value="deadline-desc">마감여유순</option>
        <option value="recent">최근등록순</option>
        <option value="school">학교명순</option>
      </select>
    </div>
    <div class="level-bar">
      <button class="level-chip on" data-filter="level" data-val="">전체</button>
      <button class="level-chip" data-filter="level" data-val="초등">초등</button>
      <button class="level-chip" data-filter="level" data-val="중등">중등</button>
      <button class="level-chip" data-filter="level" data-val="고등">고등</button>
      <button class="level-chip" data-filter="level" data-val="유치">유치원</button>
      <button class="level-chip" data-filter="level" data-val="특수">특수</button>
    </div>
    <div class="status-bar">
      <span id="status-text">불러오는 중...</span>
      <span id="updated-at"></span>
    </div>
    <div id="job-list"><div class="empty">불러오는 중...</div></div>
  </div>

</div>

<!-- ── 알림 설정 모달 ── -->
<div class="modal-overlay" id="notif-modal">
  <div class="modal">
    <h2>🔔 맞춤 알림 설정</h2>

    <div class="notif-toggle">
      <span>새 공고 알림 받기<br><small style="color:var(--gray-400)">방문 시 내 조건에 맞는 새 공고를 알려드려요</small></span>

    <div class="modal-section">
      <h3>관심 지역</h3>
      <div class="modal-chips" id="pref-sidos">
        <button class="chip on" data-pref="sido" data-val="">전체</button>
        <button class="chip" data-pref="sido" data-val="서울">서울</button>
        <button class="chip" data-pref="sido" data-val="경기">경기</button>
        <button class="chip" data-pref="sido" data-val="인천">인천</button>
        <button class="chip" data-pref="sido" data-val="부산">부산</button>
        <button class="chip" data-pref="sido" data-val="광주">광주</button>
        <button class="chip" data-pref="sido" data-val="대전">대전</button>
        <button class="chip" data-pref="sido" data-val="울산">울산</button>
        <button class="chip" data-pref="sido" data-val="강원">강원</button>
        <button class="chip" data-pref="sido" data-val="경남">경남</button>
        <button class="chip" data-pref="sido" data-val="경북">경북</button>
        <button class="chip" data-pref="sido" data-val="충남">충남</button>
        <button class="chip" data-pref="sido" data-val="충북">충북</button>
        <button class="chip" data-pref="sido" data-val="전남">전남</button>
        <button class="chip" data-pref="sido" data-val="전북">전북</button>
        <button class="chip" data-pref="sido" data-val="세종">세종</button>
        <button class="chip" data-pref="sido" data-val="제주">제주</button>
      </div>
    </div>

    <div class="modal-section">
      <h3>관심 학교급</h3>
      <div class="modal-chips" id="pref-levels">
        <button class="chip on" data-pref="level" data-val="">전체</button>
        <button class="chip" data-pref="level" data-val="초등">초등</button>
        <button class="chip" data-pref="level" data-val="중등">중등</button>
        <button class="chip" data-pref="level" data-val="고등">고등</button>
        <button class="chip" data-pref="level" data-val="유치">유치원</button>
        <button class="chip" data-pref="level" data-val="특수">특수</button>
      </div>

      <h3>관심 과목</h3>

    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">취소</button>
      <button class="btn btn-primary" id="modal-save">저장</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let allJobs = [];
let currentTab = 'all';
let filter = { sido: '', level: '' };
let searchQ = '';
let sortBy = 'dday';
let bookmarks = new Set(JSON.parse(localStorage.getItem('bookmarks') || '[]'));
let seenIds = new Set(JSON.parse(localStorage.getItem('seenIds') || '[]'));

const LEVEL_LABEL = { '유치': '유치원' };

// ── Service Worker ─────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(() => {
    navigator.serviceWorker.ready.then(r => {
      r.active?.postMessage({ type: 'CHECK_NEW_JOBS', prefs, seen: [...seenIds] });
    });
  });

  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'NEW_JOB_IDS') {
      e.data.ids.forEach(id => seenIds.add(id));
      localStorage.setItem('seenIds', JSON.stringify([...seenIds]));
    }
  });
}

// ── Data ───────────────────────────────────────────────────────────────────────
async function loadJobs() {
  try {
    const res = await fetch('./data/jobs.json?t=' + Date.now());
    const data = await res.json();
    allJobs = data.jobs || [];

    if (data.updated_at) {
      const d = new Date(data.updated_at);
      const mm = d.getMonth() + 1;
      const dd = d.getDate();
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      document.getElementById('updated-at').textContent = `${mm}.${dd}. ${hh}:${mi} 기준`;
    }

    allJobs.forEach(j => seenIds.add(j.id));
    localStorage.setItem('seenIds', JSON.stringify([...seenIds]));
    render();
  } catch {
    document.getElementById('job-list').innerHTML =
      '<div class="empty">데이터를 불러오지 못했습니다.<br>잠시 후 다시 시도해주세요.</div>';
  }
}

// ── D-day ──────────────────────────────────────────────────────────────────────
function dday(deadline) {
  if (!deadline) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(deadline) - today) / 86400000);
}

function ddayLabel(d) {
  if (d === null) return '';
  if (d < 0) return '마감';
  if (d === 0) return 'D-day';
  return `D-${d}`;
}

function ddayClass(d) {
  if (d === null || d < 0) return '';
  if (d <= 3) return 'dday-urgent';
  if (d <= 7) return 'dday-warning';
  return 'dday-normal';
}

function cardClass(d) {
  if (d === null || d < 0) return '';
  if (d <= 3) return 'urgent';
  if (d <= 7) return 'warning';
  return '';
}

// ── Filter + Sort ──────────────────────────────────────────────────────────────
function filteredJobs() {
  const q = searchQ.toLowerCase();
  const filtered = allJobs.filter(j => {
    if (currentTab === 'bookmarks' && !bookmarks.has(j.id)) return false;
    if (filter.sido && j.sido !== filter.sido) return false;
    if (filter.level && j.level !== filter.level) return false;
    if (q && !j.title.toLowerCase().includes(q) &&
        !(j.school||'').toLowerCase().includes(q) &&
        !j.sido.includes(q)) return false;
    return true;
  });

  return filtered.sort((a, b) => {
    if (sortBy === 'dday')         return (a.deadline||'9').localeCompare(b.deadline||'9');
    if (sortBy === 'deadline-desc') return (b.deadline||'').localeCompare(a.deadline||'');
    if (sortBy === 'recent')       return (b.crawled_at||'').localeCompare(a.crawled_at||'');
    if (sortBy === 'school')       return (a.school||'').localeCompare(b.school||'');
    return 0;
  });
}

// ── School info ────────────────────────────────────────────────────────────────
function schoolInfoUrl(name, sido) {
  const q = sido ? `${sido} ${name} 학교알리미` : `${name} 학교알리미`;
  return `https://search.naver.com/search.naver?query=${encodeURIComponent(q)}`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  const jobs = filteredJobs();
  const list = document.getElementById('job-list');

  document.getElementById('status-text').textContent =
    currentTab === 'bookmarks'
      ? `북마크 ${jobs.length}건`
      : `${jobs.length}건`;

  if (jobs.length === 0) {
    list.innerHTML = currentTab === 'bookmarks'
      ? '<div class="empty">북마크한 공고가 없습니다.<br>공고 카드의 ☆를 눌러 저장하세요.</div>'
      : '<div class="empty">조건에 맞는 공고가 없습니다.</div>';
    return;
  }

  list.innerHTML = jobs.map(job => {
    const d = dday(job.deadline);
    const bm = bookmarks.has(job.id);
    const dlClass = d !== null && d <= 3 ? 'urgent' : d !== null && d <= 7 ? 'warning' : '';
    const dl = ddayLabel(d);

    return `
    <div class="job-card ${cardClass(d)}" data-id="${job.id}">
      <div class="card-top">
        <div class="card-title">${escHtml(job.title)}</div>
        <button class="bookmark-btn" data-id="${job.id}">${bm ? '⭐' : '☆'}</button>
      </div>
      <div class="card-meta">
        <span class="badge badge-sido">${escHtml(job.sido)}</span>
        ${job.level ? `<span class="badge badge-level">${escHtml(LEVEL_LABEL[job.level] || job.level)}</span>` : ''}
        ${job.subject ? `<span class="badge badge-subject">${escHtml(job.subject)}</span>` : ''}
        ${dl ? `<span class="dday ${ddayClass(d)}">${dl}</span>` : ''}
      </div>
      <div class="card-bottom">
        ${job.school ? `
          <span class="card-school">${escHtml(job.school)}</span>
          <button class="school-link" data-school="${escHtml(job.school)}" data-sido="${escHtml(job.sido)}">학교알리미</button>
        ` : ''}
      </div>
      ${job.deadline ? `<div class="card-deadline ${dlClass}">마감 ${job.deadline}</div>` : ''}
    </div>`;
  }).join('');

  list.querySelectorAll('.job-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.bookmark-btn') || e.target.closest('.school-link')) return;
      const job = allJobs.find(j => j.id === card.dataset.id);
      if (job?.url) window.open(job.url, '_blank');
    });
  });

  list.querySelectorAll('.bookmark-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (bookmarks.has(id)) { bookmarks.delete(id); btn.textContent = '☆'; }
      else { bookmarks.add(id); btn.textContent = '⭐'; }
      localStorage.setItem('bookmarks', JSON.stringify([...bookmarks]));
      if (currentTab === 'bookmarks') render();
    });
  });

  list.querySelectorAll('.school-link').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      window.open(schoolInfoUrl(btn.dataset.school, btn.dataset.sido), '_blank');
    });
  });
}

// ── Tabs ───────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.dataset.tab === 'notif') {
      openNotifModal();
      return;
    }
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    render();
  });
});

// ── Sidebar (시도) ─────────────────────────────────────────────────────────────
document.querySelectorAll('.sidebar-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-btn[data-filter]').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    filter.sido = btn.dataset.val;
    document.getElementById('job-list').scrollTop = 0;
    render();
  });
});

// ── Level top bar ──────────────────────────────────────────────────────────────
document.querySelectorAll('.level-chip[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.level-chip[data-filter]').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    filter.level = btn.dataset.val;
    document.getElementById('job-list').scrollTop = 0;
    render();
  });
});

// ── Search ─────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

// ── Sort ───────────────────────────────────────────────────────────────────────
document.getElementById('sort-select').addEventListener('change', e => {
  sortBy = e.target.value;
  render();
});

// ── Notification modal ─────────────────────────────────────────────────────────
const modal = document.getElementById('notif-modal');
const notifToggle = document.getElementById('notif-toggle');

function openNotifModal() {
  modal.classList.add('open');
  const p = JSON.parse(localStorage.getItem('prefs') || '{"sidos":[],"levels":[],"subjects":[]}');
  notifToggle.checked = localStorage.getItem('notifEnabled') === 'true';

  document.querySelectorAll('#pref-sidos .chip').forEach(c => {
    const saved = p.sidos || [];
    c.classList.toggle('on', saved.length === 0 ? c.dataset.val === '' : saved.includes(c.dataset.val));
  });
  document.querySelectorAll('#pref-levels .chip').forEach(c => {
    const saved = p.levels || [];
    c.classList.toggle('on', saved.length === 0 ? c.dataset.val === '' : saved.includes(c.dataset.val));
  });
  document.getElementById('pref-subjects').value = (p.subjects || []).join(', ');
}

modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.remove('open'));

document.querySelectorAll('.chip[data-pref]').forEach(chip => {
  chip.addEventListener('click', () => {
    const group = chip.dataset.pref;
    const val = chip.dataset.val;
    if (val === '') {
      document.querySelectorAll(`#pref-${group}s .chip`).forEach(c => c.classList.remove('on'));
      chip.classList.add('on');
    } else {
      document.querySelector(`#pref-${group}s .chip[data-val=""]`)?.classList.remove('on');
      chip.classList.toggle('on');
      const anyOn = [...document.querySelectorAll(`#pref-${group}s .chip[data-val]:not([data-val=""])`)].some(c => c.classList.contains('on'));
      if (!anyOn) document.querySelector(`#pref-${group}s .chip[data-val=""]`)?.classList.add('on');
    }
  });
});

document.getElementById('modal-save').addEventListener('click', async () => {
  const wantsNotif = notifToggle.checked;
  if (wantsNotif) {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      alert('알림 권한이 거부되었습니다. 브라우저 설정에서 알림을 허용해주세요.');
      return;
    }
  }
  const selSidos = [...document.querySelectorAll('#pref-sidos .chip.on')].map(c => c.dataset.val).filter(v => v !== '');
  const selLevels = [...document.querySelectorAll('#pref-levels .chip.on')].map(c => c.dataset.val).filter(v => v !== '');
  const selSubjects = document.getElementById('pref-subjects').value.split(',').map(s => s.trim()).filter(Boolean);
  localStorage.setItem('prefs', JSON.stringify({ sidos: selSidos, levels: selLevels, subjects: selSubjects }));
  localStorage.setItem('notifEnabled', wantsNotif ? 'true' : 'false');
  modal.classList.remove('open');
});

// ── Init ───────────────────────────────────────────────────────────────────────
loadJobs();
</script>
</body>
