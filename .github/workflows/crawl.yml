name: 기간제교사 채용공고 크롤링

on:
  schedule:
    - cron: '0 1,6,13 * * *'  # 하루 3회 (UTC 1/6/13시 = KST 10/15/22시)
  workflow_dispatch:              # 수동 실행도 가능

concurrency:
  group: crawl
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 받기
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm install

      - name: 크롤링 실행
        run: npm run crawl

      - name: 결과 저장 (자동 커밋)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "자동 업데이트: 채용공고 크롤링"
          file_pattern: data/jobs.json
          push_options: '--force-with-lease'
